name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build_deploy_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          # Get current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: v${CURRENT}"

          # Bump patch version using npm (creates commit + tag)
          NEW=$(npm version patch --no-git-tag-version)
          echo "New version: ${NEW}"
          echo "version=${NEW}" >> $GITHUB_OUTPUT

          # Commit the version bump
          git add package.json
          git commit -m "chore: bump version to ${NEW}"
          git tag "${NEW}"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}" >> .env
          echo "VITE_APP_VERSION=${{ steps.version.outputs.version }}" >> .env

      - name: Build project
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AH_WELLNESS_HUB }}
          channelId: live
          projectId: ah-wellness-hub
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Push version commit and tag
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          NEW_TAG="${{ steps.version.outputs.version }}"

          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from ${PREV_TAG} to ${NEW_TAG}"
            NOTES=$(git log ${PREV_TAG}..HEAD~1 --pretty=format:"- %s" --no-merges | grep -v "chore: bump version")
          else
            echo "No previous tag, using all commits"
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -20 | grep -v "chore: bump version")
          fi

          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release_notes.txt
          echo "Generated release notes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release in Firestore
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_ID="ah-wellness-hub"

          # Get access token from service account using Node.js crypto (no deps needed)
          ACCESS_TOKEN=$(node -e "
            const crypto = require('crypto');
            const sa = JSON.parse(process.env.SA_KEY);
            const now = Math.floor(Date.now() / 1000);
            const header = Buffer.from(JSON.stringify({alg:'RS256',typ:'JWT'})).toString('base64url');
            const payload = Buffer.from(JSON.stringify({
              iss: sa.client_email,
              scope: 'https://www.googleapis.com/auth/datastore',
              aud: 'https://oauth2.googleapis.com/token',
              iat: now,
              exp: now + 3600
            })).toString('base64url');
            const sig = crypto.sign('RSA-SHA256', Buffer.from(header+'.'+payload), sa.private_key).toString('base64url');
            const jwt = header+'.'+payload+'.'+sig;
            fetch('https://oauth2.googleapis.com/token', {
              method:'POST',
              headers:{'Content-Type':'application/x-www-form-urlencoded'},
              body:'grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion='+jwt
            }).then(r=>r.json()).then(d=>console.log(d.access_token));
          ")

          # Write notification to Firestore via REST API
          curl -sf -X POST \
            "https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/notifications" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"type\": {\"stringValue\": \"system_release\"},
                \"recipientId\": {\"stringValue\": \"all\"},
                \"title\": {\"stringValue\": \"New Release Available\"},
                \"message\": {\"stringValue\": \"Version ${VERSION} has been published. Please refresh your browser to get the latest updates.\"},
                \"read\": {\"booleanValue\": false},
                \"readBy\": {\"arrayValue\": {\"values\": []}},
                \"createdAt\": {\"timestampValue\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"},
                \"metadata\": {\"mapValue\": {\"fields\": {\"version\": {\"stringValue\": \"${VERSION}\"}}}}
              }
            }"
          echo "Release notification created for ${VERSION}"
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AH_WELLNESS_HUB }}

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to:** https://ah-wellness-hub.web.app" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Successfully deployed and released" >> $GITHUB_STEP_SUMMARY
